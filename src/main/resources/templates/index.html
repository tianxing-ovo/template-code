<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Code 控制台</title>
    <!-- 引入高档英文字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #090d16;
            --bg-surface: rgba(17, 24, 39, 0.7);
            --bg-card: rgba(30, 41, 59, 0.45);
            --bg-control: rgba(15, 23, 42, 0.6);
            --bg-table-header: rgba(30, 41, 59, 0.4);
            --bg-modal: #111827;
            --bg-toast: rgba(30, 41, 59, 0.9);
            --border-glow: rgba(99, 102, 241, 0.15);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --primary-hover: #4f46e5;
            
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --error: #ef4444;
            --error-glow: rgba(239, 68, 68, 0.2);
            --warning: #f59e0b;
            --warning-glow: rgba(245, 158, 11, 0.2);
            --info: #0ea5e9;
            --info-glow: rgba(14, 165, 233, 0.2);
            
            --radial-glow: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                           radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.12) 0%, transparent 40%);
            --header-bg: rgba(9, 13, 22, 0.5);
            --title-gradient: linear-gradient(to right, #ffffff, #a5b4fc);
        }

        :root[data-theme="light"] {
            --bg-base: #f8fafc;
            --bg-surface: rgba(255, 255, 255, 0.75);
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-control: #ffffff;
            --bg-table-header: rgba(241, 245, 249, 0.85);
            --bg-modal: #ffffff;
            --bg-toast: rgba(255, 255, 255, 0.95);
            --border-glow: rgba(99, 102, 241, 0.08);
            --border-subtle: rgba(15, 23, 42, 0.08);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --primary-hover: #3730a3;
            
            --radial-glow: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 40%),
                           radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            --header-bg: rgba(255, 255, 255, 0.65);
            --title-gradient: linear-gradient(to right, #0f172a, #334155);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: var(--radial-glow);
            background-attachment: fixed;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 顶部导航 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-subtle);
            backdrop-filter: blur(12px);
            background-color: var(--header-bg);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-badge {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            box-shadow: 0 0 15px var(--primary-glow);
            letter-spacing: 1px;
        }

        .logo-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            background: var(--title-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 信息提示组件 */
        #toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 400px;
        }

        .toast {
            background: var(--bg-toast);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            color: var(--text-primary);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            backdrop-filter: blur(8px);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s ease, color 0.3s ease;
        }

        :root[data-theme="light"] .toast {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .toast-success .toast-icon { background: var(--success); color: white; }
        .toast-error .toast-icon { background: var(--error); color: white; }
        .toast-info .toast-icon { background: var(--info); color: white; }

        .toast-content {
            flex-grow: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .toast-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 0.2rem;
            line-height: 1;
        }

        /* 主容器 */
        main {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            main {
                grid-template-columns: 1.2fr 0.8fr;
            }
        }

        /* 通用卡片样式 */
        .glass-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 1.75rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        :root[data-theme="light"] .glass-card {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        :root[data-theme="light"] .glass-card:hover {
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.08);
        }

        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--border-glow), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .glass-card:hover::before {
            transform: translateX(100%);
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.25);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.04);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 0.75rem;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title svg {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        /* 统一输入框与表单 */
        .form-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (min-width: 640px) {
            .form-row-3 {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
            .form-row-2 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            min-width: 0;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            background-color: var(--bg-control);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.25s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.25);
        }

        /* 按钮设计 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border-radius: 8px;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-subtle);
            color: var(--text-primary);
        }

        :root[data-theme="light"] .btn-secondary {
            background: #ffffff;
            border-color: var(--border-subtle);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        :root[data-theme="light"] .btn-secondary:hover {
            background: rgba(15, 23, 42, 0.04);
        }

        .btn-danger {
            background: rgba(239, 108, 108, 0.1);
            border-color: rgba(239, 68, 68, 0.25);
            color: var(--error);
        }

        .btn-danger:hover {
            background: var(--error);
            color: white;
        }

        .btn-sm {
            padding: 0.35rem 0.75rem;
            font-size: 0.75rem;
            border-radius: 6px;
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
        }

        /* 表格样式 */
        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background-color: rgba(15, 23, 42, 0.2);
            margin-top: 1rem;
            transition: background-color 0.3s ease;
        }

        :root[data-theme="light"] .table-container {
            background-color: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 0.85rem;
        }

        th {
            background-color: var(--bg-table-header);
            color: var(--text-secondary);
            font-weight: 600;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border-subtle);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            transition: background-color 0.3s ease;
        }

        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }

        :root[data-theme="light"] td {
            border-bottom: 1px solid rgba(15, 23, 42, 0.04);
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.015);
        }

        :root[data-theme="light"] tr:hover td {
            background-color: rgba(15, 23, 42, 0.015);
        }

        /* 导出任务表格居中对齐且不换行 */
        #task-table th, #task-table td {
            text-align: center;
            white-space: nowrap;
        }

        /* 状态标记 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-0 { background: rgba(100, 116, 139, 0.15); color: var(--text-secondary); } /* 排队中 */
        .status-1 { background: rgba(14, 165, 233, 0.15); color: var(--info); }        /* 运行中 */
        .status-2 { background: rgba(16, 185, 129, 0.15); color: var(--success); }     /* 成功 */
        .status-3 { background: rgba(239, 68, 68, 0.15); color: var(--error); }        /* 失败 */

        /* 上传区域 */
        .upload-zone {
            border: 2px dashed var(--border-subtle);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(15, 23, 42, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        :root[data-theme="light"] .upload-zone {
            background: rgba(15, 23, 42, 0.02);
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.03);
        }

        .upload-icon {
            width: 40px;
            height: 40px;
            color: var(--text-muted);
            transition: color 0.25s ease;
        }

        .upload-zone:hover .upload-icon {
            color: var(--primary);
        }

        .upload-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .upload-text span {
            color: var(--primary);
            font-weight: 600;
        }

        /* 弹窗/模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(9, 13, 22, 0.6);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--bg-modal);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            width: 90%;
            max-width: 680px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        :root[data-theme="light"] .modal-content {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .modal.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
        }

        :root[data-theme="light"] .modal-header {
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
        }

        .modal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
        }

        /* 载入特效 */
        .spinner {
            border: 2px solid rgba(148, 163, 184, 0.25);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 选中列设置 */
        .field-checkbox-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.5rem;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-subtle);
            padding: 0.75rem;
            border-radius: 8px;
            max-height: 120px;
            overflow-y: auto;
            transition: background-color 0.3s ease;
        }

        :root[data-theme="light"] .field-checkbox-container {
            background: rgba(15, 23, 42, 0.03);
        }

        .field-checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 提示框容器 -->
    <div id="toast-container"></div>

    <!-- 顶部导航 -->
    <header>
        <div class="logo-section">
            <div class="logo-badge">LTX</div>
            <div class="logo-title">Template Code 控制台</div>
        </div>
        <div style="font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 1rem;">
            <!-- 主题切换按钮 -->
            <button id="theme-toggle" class="btn btn-secondary btn-sm" onclick="toggleTheme()" style="padding: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;">
                <!-- 太阳图标 -->
                <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:16px; height:16px;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                </svg>
                <!-- 月亮图标 -->
                <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:16px; height:16px; display:none;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                </svg>
            </button>
            <span class="status-badge status-2">在线</span>
            <span>当前登录：ID 1 (模拟)</span>
        </div>
    </header>

    <!-- 主布局 -->
    <main>
        
        <!-- 左侧栏：用户管理与上传 -->
        <div style="display: flex; flex-direction: column; gap: 2rem;">
            
            <!-- 用户管理卡片 -->
            <div class="glass-card">
                <div class="card-header">
                    <div class="card-title">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.386 11.386 0 0110.089 20c-2.202 0-4.277-.625-6.042-1.71a3.12 3.12 0 014.538-4.908c.556.449 1.161.8 1.815 1.054m4.796-1.48c.024-.31.034-.62.034-.931s-.01-.621-.034-.931m-4.796 1.48a11.112 11.112 0 003.478-.397m-12 5.62c.34-.059.68-.114 1.022-.165m0 0a10.82 10.82 0 019.98-9.98m-9.98 9.98A11.411 11.411 0 0110.09 18a11.41 11.41 0 01-6.042-1.71" />
                        </svg>
                        用户数据管理
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="openAddModal()">
                        + 新增用户
                    </button>
                </div>

                <!-- 搜索表单 -->
                <div class="form-row form-row-3">
                    <div class="form-group">
                        <label class="form-label">用户 ID</label>
                        <input type="number" id="search-id" class="form-control" placeholder="按ID精准查询">
                    </div>
                    <div class="form-group">
                        <label class="form-label">姓名</label>
                        <input type="text" id="search-name" class="form-control" placeholder="按姓名模糊查询">
                    </div>
                    <div class="form-group">
                        <label class="form-label">年龄</label>
                        <input type="number" id="search-age" class="form-control" placeholder="输入最大年龄限制">
                    </div>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-bottom: 1.5rem;">
                    <button class="btn btn-secondary btn-sm" onclick="resetSearch()">重置</button>
                    <button class="btn btn-primary btn-sm" onclick="loadUsers()">搜索</button>
                </div>

                <!-- 用户列表表格 -->
                <div class="table-container">
                    <table id="user-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>姓名</th>
                                <th>年龄</th>
                                <th>性别</th>
                                <th>城市</th>
                                <th>描述</th>
                                <th>角色</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 文件上传卡片 -->
            <div class="glass-card">
                <div class="card-header">
                    <div class="card-title">

    <script>
        // 主题切换逻辑
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let targetTheme = 'dark';
            if (currentTheme !== 'light') {
                targetTheme = 'light';
            }
            
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
            
            updateThemeIcons(targetTheme);
        }

        function updateThemeIcons(theme) {
            const sunIcon = document.getElementById('sun-icon');
            const moonIcon = document.getElementById('moon-icon');
            if (theme === 'light') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        }

        // 初始化主题设置
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // 消息通知通知组件
        function showToast(title, desc, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            let iconText = 'i';
            if (type === 'success') iconText = '✓';
            if (type === 'error') iconText = '✗';
            
            toast.innerHTML = `
                <div class="toast-icon">${iconText}</div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-desc">${desc}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            container.appendChild(toast);
            
            // 触发进入动画
            setTimeout(() => toast.classList.add('show'), 50);
            
            // 5秒后自动销毁
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 5000);
        }

        // 格式化文件大小
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // ================= USER CRUD OPERATIONS =================
        
        // 加载用户列表
        async function loadUsers() {
            const searchId = document.getElementById('search-id').value;
            const searchName = document.getElementById('search-name').value;
            const searchAge = document.getElementById('search-age').value;
            
            let queryParams = [];
            if (searchId) queryParams.push(`id=${searchId}`);
            if (searchName) queryParams.push(`name=${searchName}`);
            if (searchAge) queryParams.push(`age=${searchAge}`);
            
            const url = '/users' + (queryParams.length ? '?' + queryParams.join('&') : '');
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('网络响应错误');
                const result = await response.json();
                
                if (result.code !== 200) {
                    throw new Error(result.msg || '加载用户列表失败');
                }
                
                const users = result.data.userList || [];
                
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';
                
                if (users.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--text-muted);">暂无用户数据</td></tr>`;
                    return;
                }
                
                users.forEach(user => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td style="font-weight:600; color:var(--primary)">${user.id}</td>
                        <td>${user.name || '-'}</td>
                        <td>${user.age || '-'}</td>
                        <td>${user.sex || '-'}</td>
                        <td>${user.city || '-'}</td>
                        <td style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${user.description || ''}">${user.description || '-'}</td>
                        <td><span class="status-badge ${user.role === '管理员' ? 'status-1' : 'status-0'}">${user.role || '-'}</span></td>
                        <td>
                            <div class="btn-group" style="display: inline-flex; gap: 0.5rem;">
                                <button class="btn btn-primary btn-sm" onclick="openEditModal(${user.id})">编辑</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">删除</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                showToast('加载用户失败', err.message, 'error');
            }
        }

        // 删除用户
        async function deleteUser(id) {
            if (!confirm(`确定删除ID为 ${id} 的用户吗？`)) return;
            try {
                const response = await fetch(`/users/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('删除成功', `已删除ID为 ${id} 的用户`, 'success');
                    loadUsers();
                } else {
                    throw new Error('删除失败');
                }
            } catch (err) {
                showToast('操作失败', err.message, 'error');
            }
        }

        // 初始化省份下拉列表
        function initProvinceSelect() {
            const provinceSelect = document.getElementById('add-province');
            provinceSelect.innerHTML = '<option value="">请选择省份</option>';
            Object.keys(locationData).forEach(prov => {
                const opt = document.createElement('option');
                opt.value = prov;
                opt.textContent = prov;
                provinceSelect.appendChild(opt);
            });
            document.getElementById('add-city').innerHTML = '<option value="">请选择城市</option>';
        }

        // 省份切换联动城市
        function onProvinceChange() {
            const provinceVal = document.getElementById('add-province').value;
            const citySelect = document.getElementById('add-city');
            citySelect.innerHTML = '<option value="">请选择城市</option>';
            
            if (provinceVal && locationData[provinceVal]) {
                locationData[provinceVal].forEach(city => {
                    const opt = document.createElement('option');
                    opt.value = city;
                    opt.textContent = city;
                    citySelect.appendChild(opt);
                });
            }
        }

        // 打开/关闭模态框
        function openAddModal() {
            document.getElementById('modal-title').innerText = '添加新用户';
            document.getElementById('password-label').innerHTML = '密码 *';
            document.getElementById('add-password').required = true;
            document.getElementById('edit-user-id').value = '';

            initProvinceSelect();
            document.getElementById('add-user-modal').classList.add('show');
        }
        function closeAddModal() {
            document.getElementById('add-user-modal').classList.remove('show');
            document.getElementById('add-user-form').reset();
            document.getElementById('edit-user-id').value = '';
            document.getElementById('add-city').innerHTML = '<option value="">请选择城市</option>';
        }

        // 打开编辑模态框
        async function openEditModal(id) {
            document.getElementById('modal-title').innerText = '编辑用户';
            document.getElementById('password-label').innerHTML = '密码 (留空不修改)';
            document.getElementById('add-password').required = false;
            document.getElementById('edit-user-id').value = id;

            initProvinceSelect();
            
            try {
                const response = await fetch(`/users/${id}`);
                const result = await response.json();
                if (result.code !== 200) {
                    throw new Error(result.msg || '获取用户详情失败');
                }
                const user = result.data.user;
                
                document.getElementById('add-name').value = user.name || '';
                document.getElementById('add-age').value = user.age || '';
                document.getElementById('add-sex').value = user.sex || '男';
                document.getElementById('add-role').value = user.role || '普通用户';
                
                if (user.province) {
                    document.getElementById('add-province').value = user.province;
                    onProvinceChange();
                    if (user.city) {
                        document.getElementById('add-city').value = user.city;
                    }
                }
                
                document.getElementById('add-address').value = user.address || '';
                document.getElementById('add-description').value = user.description || '';
                
                document.getElementById('add-user-modal').classList.add('show');
            } catch (err) {
                showToast('获取详情失败', err.message, 'error');
            }
        }

        // 提交添加或修改用户
        async function submitAddUser(event) {
            event.preventDefault();
            const editId = document.getElementById('edit-user-id').value;
            const passwordVal = document.getElementById('add-password').value;
            const payload = {
                name: document.getElementById('add-name').value,
                age: parseInt(document.getElementById('add-age').value) || null,
                sex: document.getElementById('add-sex').value,
                province: document.getElementById('add-province').value,
                city: document.getElementById('add-city').value || null,
                address: document.getElementById('add-address').value,
                description: document.getElementById('add-description').value || null,
                role: document.getElementById('add-role').value
            };

            if (passwordVal) {
                payload.password = [passwordVal];
            } else if (!editId) {
                payload.password = [];
            }

            try {
                const url = editId ? `/users/${editId}` : '/users';
                const method = editId ? 'PUT' : 'POST';
                const successTitle = editId ? '用户修改成功' : '用户创建成功';
                const successDesc = editId ? '已保存用户修改信息' : '已向数据库插入新用户记录';

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    showToast(successTitle, successDesc, 'success');
                    closeAddModal();
                    loadUsers();
                } else {
                    const errMsg = await response.text();
                    throw new Error(errMsg || '提交失败');
                }
            } catch (err) {
                showToast('提交失败', err.message, 'error');
            }
        }

        function resetSearch() {
            document.getElementById('search-id').value = '';
            document.getElementById('search-name').value = '';
            document.getElementById('search-age').value = '';
            loadUsers();
        }

        // ================= FILE UPLOAD AND DOWNLOAD =================

        // 单文件上传
        async function uploadSingleFile(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            
            showToast('开始上传', `正在上传单文件: ${file.name}...`, 'info');
            try {
                const response = await fetch('/files/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.code === 200) {
                    showToast('上传成功', `文件 ${file.name} 已保存到服务器桌面！`, 'success');
                } else {
                    throw new Error(result.msg);
                }
            } catch (err) {
                showToast('文件上传失败', err.message, 'error');
            }
        }

        // 批量文件上传
        async function uploadBatchFiles(files) {
            if (!files || files.length === 0) return;
            const formData = new FormData();
            for (let file of files) {
                formData.append('files', file);
            }
            
            showToast('开始上传', `正在上传 ${files.length} 个文件...`, 'info');
            try {
                const response = await fetch('/files/batch-upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.code === 200) {
                    showToast('批量上传成功', result.msg, 'success');
                } else {
                    throw new Error(result.msg);
                }
            } catch (err) {
                showToast('批量上传失败', err.message, 'error');
            }
        }

        // ================= IMPORT & EXPORT =================

        // Excel 导入
        async function importExcel() {
            const fileInput = document.getElementById('excel-import-file');
            const file = fileInput.files[0];
            if (!file) {
                showToast('未选择文件', '请先选择需要导入的 Excel/CSV 文件', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            showToast('导入中', '正在解析 Excel 文件并将用户保存至数据库...', 'info');
            try {
                const response = await fetch('/users/import', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.code === 200) {
                    showToast('导入成功', `成功导入并落库 ${result.data.userList.length} 条用户数据`, 'success');
                    fileInput.value = ''; // 清空
                    loadUsers();
                } else {
                    throw new Error(result.msg);
                }
            } catch (err) {
                showToast('导入失败', err.message, 'error');
            }
        }

        // 获取选中的导出字段
        function getSelectedExportFields() {
            const checkboxes = document.querySelectorAll('input[name="export-fields"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // 浏览器同步下载文件
        async function exportToBrowser() {
            const fileName = document.getElementById('export-filename').value;
            const fieldList = getSelectedExportFields();
            if (!fileName) {
                showToast('缺少参数', '请指定导出文件名', 'error');
                return;
            }
            
            showToast('开始生成', '正在下载 Excel 导出包...', 'info');
            try {
                const response = await fetch('/users/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_name: fileName, field_list: fieldList })
                });
                
                if (!response.ok) throw new Error('导出下载失败');
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                a.remove();
                showToast('导出成功', `文件 ${fileName} 已经成功保存到您的本地`, 'success');
            } catch (err) {
                showToast('导出失败', err.message, 'error');
            }
        }

        // 后台异步导出到本地
        async function exportToLocal() {
            const fileName = document.getElementById('export-filename').value;
            const fieldList = getSelectedExportFields();
            if (!fileName) {
                showToast('缺少参数', '请指定导出文件名', 'error');
                return;
            }
            
            try {
                const response = await fetch('/users/export/local', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_name: fileName, field_list: fieldList })
                });
                
                if (response.ok) {
                    showToast('任务已提交', '异步导出后台线程已启动，请查看右侧监控器状态', 'success');
                    loadExportTasks(); // 刷新任务列表
                } else {
                    throw new Error('提交异步导出失败');
                }
            } catch (err) {
                showToast('提交失败', err.message, 'error');
            }
        }

        // ================= ASYNC EXPORT TASK MONITOR =================

        // 状态文案和样式
        function getStatusBadge(status) {
            let label = '排队中';
            if (status === 1) label = '导出中';
            if (status === 2) label = '成功';
            if (status === 3) label = '失败';
            return `<span class="status-badge status-${status}">${label}</span>`;
        }

        // 加载导出任务列表
        async function loadExportTasks() {
            try {
                const response = await fetch('/export-tasks');
                if (!response.ok) throw new Error('刷新任务列表失败');
                const result = await response.json();
                
                if (result.code === 200) {
                    const tasks = result.data.exportTaskList;
                    const tbody = document.getElementById('task-table-body');
                    tbody.innerHTML = '';
                    
                    if (tasks.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">暂无导出记录</td></tr>`;
                        return;
                    }
                    
                    tasks.forEach(task => {
                        const createTime = task.create_time ? task.create_time.replace('T', ' ') : '-';
                        const fileSizeLabel = task.file_size ? formatBytes(task.file_size) : '-';
                        
                        let actionButton = '-';
                        if (task.export_status === 2 && task.file_path) {
                            actionButton = `
                                <div class="btn-group" style="justify-content: center; display: inline-flex;">
                                    <a href="${task.file_path}" class="btn btn-primary btn-sm" download>下载</a>
                                    <button class="btn btn-danger btn-sm" onclick="deleteExportTask(${task.id})">删除</button>
                                </div>
                            `;
                        } else if (task.export_status === 3 && task.fail_reason) {
                            actionButton = `
                                <div class="btn-group" style="justify-content: center; display: inline-flex;">
                                    <button class="btn btn-secondary btn-sm" onclick="alert('错误原因:\\n${task.fail_reason.replace(/'/g, "\\'")}')">查看错误</button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteExportTask(${task.id})">删除</button>
                                </div>
                            `;
                        } else if (task.export_status === 1) {
                            actionButton = `<span class="spinner"></span>`;
                        }

                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td style="font-weight:600; color:var(--primary)">${task.id}</td>
                            <td>${getStatusBadge(task.export_status)}</td>
                            <td>${fileSizeLabel}</td>
                            <td style="font-size:0.75rem; color:var(--text-secondary)">${createTime}</td>
                            <td>${actionButton}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 删除失败的导出任务
        async function deleteExportTask(id) {
            if (!confirm(`确定要删除任务 ${id} 吗？`)) return;
            try {
                const response = await fetch(`/export-tasks/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.code === 200) {
                    showToast('删除成功', `任务 ${id} 已被删除`, 'success');
                    loadExportTasks();
                } else {
                    throw new Error(result.msg || '删除失败');
                }
            } catch (err) {
                showToast('操作失败', err.message, 'error');
            }
        }

        // 定时轮询器
        setInterval(() => {
            const autoRefresh = document.getElementById('auto-refresh').checked;
            if (autoRefresh) {
                loadExportTasks();
            }
        }, 5000);

        // 初始化加载
        window.onload = () => {
            updateThemeIcons(savedTheme);
            loadUsers();
            loadExportTasks();
        }
    </script>
