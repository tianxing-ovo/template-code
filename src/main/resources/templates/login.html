<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Template Code 控制台</title>
    <!-- 立即读取本地主题配置，防止页面闪烁 -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <!-- 引入高档英文字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #090d16;
            --bg-surface: rgba(17, 24, 39, 0.7);
            --bg-card: rgba(30, 41, 59, 0.45);
            --bg-control: rgba(15, 23, 42, 0.6);
            --border-glow: rgba(99, 102, 241, 0.15);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --primary-hover: #4f46e5;
            --error: #ef4444;
            --success: #10b981;
            
            --radial-glow: radial-gradient(circle at 50% 30%, rgba(99, 102, 241, 0.18) 0%, transparent 50%),
                           radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.12) 0%, transparent 40%);
            --title-gradient: linear-gradient(to right, #ffffff, #a5b4fc);
            --bg-toast: rgba(30, 41, 59, 0.95);
        }

        :root[data-theme="light"] {
            --bg-base: #f8fafc;
            --bg-surface: rgba(255, 255, 255, 0.75);
            --bg-card: rgba(255, 255, 255, 0.75);
            --bg-control: #ffffff;
            --border-glow: rgba(99, 102, 241, 0.08);
            --border-subtle: rgba(15, 23, 42, 0.08);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --primary-hover: #3730a3;
            
            --radial-glow: radial-gradient(circle at 50% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                           radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
            --title-gradient: linear-gradient(to right, #0f172a, #334155);
            --bg-toast: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: var(--radial-glow);
            background-attachment: fixed;
            transition: background-color 0.3s ease, color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* 顶部主题切换定位 */
        .theme-switch-container {
            position: absolute;
            top: 2rem;
            right: 2rem;
        }

        /* 提示框容器 */
        #toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 400px;
        }

        .toast {
            background: var(--bg-toast);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            color: var(--text-primary);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            backdrop-filter: blur(8px);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        :root[data-theme="light"] .toast {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .toast-success .toast-icon { background: var(--success); color: white; }
        .toast-error .toast-icon { background: var(--error); color: white; }

        .toast-content {
            flex-grow: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .toast-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 0.2rem;
            line-height: 1;
        }

        /* 登录卡片 */
        .glass-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(25px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 8px 32px 0 rgba(99, 102, 241, 0.05);
        }

        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--primary), transparent);
            transform: translateX(-100%);
            transition: transform 0.8s ease;
        }

        .glass-card:hover::before {
            transform: translateX(100%);
        }

        .card-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-badge {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--primary-glow);
            letter-spacing: 1px;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            background: var(--title-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* 表单样式 */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .form-control {
            width: 100%;
            background-color: var(--bg-control);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.25s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.25);
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border-radius: 10px;
            padding: 0.8rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid transparent;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
            filter: brightness(1.15);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-subtle);
            color: var(--text-primary);
        }

        :root[data-theme="light"] .btn-secondary {
            background: #ffffff;
            border-color: var(--border-subtle);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* 载入特效 */
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.25);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border-left-color: white;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 隐藏系统默认图标样式 */
        .btn-icon {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

    <!-- 主题切换按钮 -->
    <div class="theme-switch-container">
        <button id="theme-toggle" class="btn btn-secondary" onclick="toggleTheme()" style="padding: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px;">
            <!-- 太阳图标 -->
            <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px; height:18px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
            </svg>
            <!-- 月亮图标 -->
            <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px; height:18px; display:none;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
            </svg>
        </button>
    </div>

    <!-- 提示框容器 -->
    <div id="toast-container"></div>

    <!-- 登录面板 -->
    <div class="glass-card">
        <div class="card-header">
            <div class="logo-badge">LTX</div>
            <h1 class="card-title">Template Code</h1>
            <p class="card-subtitle">请登录您的控制台账号</p>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <div class="input-wrapper">
                    <input type="text" id="username" class="form-control" placeholder="请输入您的账号" required autocomplete="username">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label class="form-label" for="password">密码</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="请输入您的密码" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn btn-primary">
                <span>立即登录</span>
            </button>
        </form>
    </div>

    <script>
        // 主题切换逻辑
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let targetTheme = 'dark';
            if (currentTheme !== 'light') {
                targetTheme = 'light';
            }
            
            document.documentElement.setAttribute('data-theme', targetTheme);
            localStorage.setItem('theme', targetTheme);
            updateThemeIcons(targetTheme);
        }

        function updateThemeIcons(theme) {
            const sunIcon = document.getElementById('sun-icon');
            const moonIcon = document.getElementById('moon-icon');
            if (theme === 'light') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        }

        // 初始化主题图标
        updateThemeIcons(localStorage.getItem('theme') || 'dark');

        // 如果用户本身已有可用 Token，直接尝试前往首页
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }

        // 消息通知组件
        function showToast(title, desc, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            let iconText = 'i';
            if (type === 'success') iconText = '✓';
            if (type === 'error') iconText = '✗';
            
            toast.innerHTML = `
                <div class="toast-icon">${iconText}</div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-desc">${desc}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // 异步登录提交处理
        async function handleLogin(event) {
            event.preventDefault();
            
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submit-btn');
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                showToast('输入不完整', '请填写用户名和密码！', 'error');
                return;
            }

            // 禁用按钮并展示加载动画
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> <span>正在登录...</span>';
            
            try {
                // Spring Security 的 formLogin 默认使用 x-www-form-urlencoded
                const bodyParams = new URLSearchParams();
                bodyParams.append('username', username);
                bodyParams.append('password', password);
                
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: bodyParams
                });

                if (!response.ok) {
                    throw new Error('网络请求异常，服务器响应 ' + response.status);
                }

                const result = await response.json();
                
                if (result.code === 200) {
                    showToast('登录成功', '正在为您跳转...', 'success');
                    // 存储 token 并在一秒后跳转
                    localStorage.setItem('token', result.data.token);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    throw new Error(result.msg || '登录校验失败，请检查账号密码！');
                }
            } catch (err) {
                showToast('登录失败', err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>立即登录</span>';
            }
        }
    </script>
</body>
</html>
